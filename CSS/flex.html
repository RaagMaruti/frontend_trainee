<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex</title>

    <style>
        /* fonts, variables */
        body {
            --family: 'Courier New', Courier, monospace;
            font-family: var(--family);
        }

        #one {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap-reverse;
        }

        .one {
            background-color: aquamarine;
            height: auto;
            margin: 5vh;
            padding: 1vh;
            border: 0.5vh black solid;
            width: 10vh;
            text-align: center;
            outline: 0.5vh ridge rebeccapurple;
            text-transform: uppercase;
        }

        #two {
            display: grid;
            gap: 2vw;
            grid-template-columns: auto auto auto auto;
            justify-content: space-evenly;
        }

        #two>div {
            background-color: brown;
            color: white;
            border: 0.5vh black solid;
            width: 200px;
            padding: 1vw;
            text-align: center;
            outline: 0.5vh ridge rebeccapurple;
            text-transform: uppercase;
        }


        p {
            background-color: burlywood;
            width: 100%;
        }

        @media screen and (max-width: 1000px) {
            div {
                background-color: darkgray;
                color: white
            }
        }

        @media screen and (max-width: 500px) {
            div {
                background-color: darkblue;
                color: lightblue;
            }
        }
    </style>
</head>

<body>
    <section id="one">
        <div class="one">1 one</div>
        <div class="one">2 two</div>
        <div class="one">3 three</div>
        <div class="one">4 four</div>
        <div class="one">5 five</div>
        <div class="one" style="flex-direction: row-reverse; display: flex;">
            <p>6</p>
            <p>7</p>
            <p>8</p>
            <p>9</p>
        </div>
    </section>

    <section id="two">
        <div>1 one</div>
        <div>2 two</div>
        <div>3 three</div>
        <div>4 four</div>
        <div>5 five</div>
        <div>
            <p>6</p>
            <p>7</p>
            <p>8</p>
            <p>9</p>
        </div>
    </section>
</body>

</html>
